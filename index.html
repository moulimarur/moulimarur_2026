<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouli G Marur — Designer · DocuMentor</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100;300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00A3D3;
    --black: #080808;
    --off: #e8e2d6;
    --mid: #888;
    --faint: #1a1a1a;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--off);
    font-family: 'Roboto Slab', Georgia, serif;
    overflow: hidden;
  }

  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    position: relative;
  }

  /* Background grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,163,211,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,163,211,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 2rem;
    animation: fadeIn 1.6s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rule-top {
    width: 1px;
    height: 80px;
    background: var(--cyan);
    margin: 0 auto 2.5rem;
    transform-origin: top;
    animation: growDown 1s ease 0.3s forwards;
    transform: scaleY(0);
  }

  @keyframes growDown {
    to { transform: scaleY(1); }
  }

  .label {
    font-family: 'Source Serif 4', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 0.8s forwards;
  }

  h1 {
    font-family: 'Roboto Slab', Georgia, serif;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--off);
    margin-bottom: 0.4rem;
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
  }

  .middle-initial {
    color: var(--cyan);
  }

  .title {
    font-family: 'Roboto Slab', Georgia, serif;
    font-weight: 100;
    color: var(--mid);
    letter-spacing: 0.08em;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }

  .rule-h {
    width: 48px;
    height: 1px;
    background: var(--cyan);
    margin: 0 auto 2.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.4s forwards;
  }

  .tagline {
    font-size: clamp(11px, 1.4vw, 13px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  .coming {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--cyan);
    padding: 8px 20px;
    font-family: 'Source Serif 4', serif;
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards;
  }

  .rule-bottom {
    width: 1px;
    height: 80px;
    background: var(--cyan);
    margin: 2.5rem auto 0;
    transform-origin: bottom;
    animation: growUp 1s ease 0.3s forwards;
    transform: scaleY(0);
  }

  @keyframes growUp {
    to { transform: scaleY(1); }
  }

  .footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
    opacity: 0;
    animation: fadeIn 1s ease 2.2s forwards;
  }

  .footer span {
    color: var(--cyan);
    margin: 0 8px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="rule-top"></div>
  <p class="label">YCuBeD Publishers</p>
  <h1>Mouli <span class="middle-initial">G</span> Marur</h1>
  <p class="title">Designer. &nbsp;DocuMentor. &nbsp;Publisher.</p>
  <div class="rule-h"></div>

  <span class="coming">Site launching soon</span>
  <div class="rule-bottom"></div>
</div>



</body>
</html>
